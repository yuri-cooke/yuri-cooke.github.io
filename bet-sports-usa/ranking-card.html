<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Sports USA | Ranking</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="css/ranking-card.css">
    <link id="stylesheet" rel="stylesheet" href="css/light-mode.css">
    <link rel="stylesheet" href="css/types.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>
    <main>
        <section class=" py-5">
            <div class="container">
                <!-- ranking card - start -->
                <div class="d-flex ranking-card shadow">
                    <div class="ranking-card__content">
                        <div class="ranking-card__content--brand">
                            <div class="position">
                                <div class="before-place"></div>
                                <div class="place">1</div>
                                <div class="category">America’s No. 1 Sportsbook</div>
                            </div>
                            <img src="img/brand-1.svg" alt="brand">
                        </div>
                        <div class="ranking-card__content--offer">
                            <h2>Up to $1,000 Back</h2>
                        </div>
                    </div>
                    <div class="ranking-card__actions">
                        <div class="score">
                            <div class="score-points-review" >
                                <div class="score-points" >
                                    <span>9.9</span>
                                </div>
                                <div class="score-review">
                                    <i class="rate-4"></i>
                                    <a href="#" role="link" tabindex="0">Read Review</a>
                                </div>
                            </div>
                            <button class="btn btn-score-bonus order-md-3 order-3">Get Bonus <i class="i-arrow-forward"></i></button>
                        </div>
                    </div>
                </div>
                <!-- ranking card - end -->
            </div>
        </section>
        <section class=" py-5">
            <div class="container">
                <!-- ranking card - start -->
                <div class="d-flex ranking-card shadow">
                    <div class="ranking-card__content">
                        <div class="ranking-card__content--brand">
                            
                            <img src="img/brand-1.svg" alt="brand">
                        </div>
                        <div class="ranking-card__content--offer">
                            <h2>Up to $1,000 Back</h2>
                            <span>A perfect example of this is when you are trying to decide which online casino best suits you.</span>
                        </div>
                    </div>
                    <div class="ranking-card__actions">
                        <div class="score">
                            <div class="score-points-review" >
                                <div class="score-points" >
                                    <span>9.9</span>
                                </div>
                                <div class="score-review">
                                    <i class="rate-4"></i>
                                    <a href="#" role="link" tabindex="0">Read Review</a>
                                </div>
                            </div>
                            <button class="btn btn-score-bonus order-md-3 order-3">Get Bonus <i class="i-arrow-forward"></i></button>
                        </div>
                    </div>
                </div>
                <!-- ranking card - end -->
            </div>
        </section>
    </main>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <script src="js/closeAd.js"></script>
    <script src="js/darkMode.js"></script>
    <script src="js/selectStates.js"></script>






</body>

</html>
